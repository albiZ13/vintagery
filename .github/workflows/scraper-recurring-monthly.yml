name: Mercati Ricorrenti — Scansione Mensile Italia

on:
  schedule:
    - cron: '0 5 1 * *'   # 1° di ogni mese alle 06:00 ora di Roma (05:00 UTC)
  workflow_dispatch:
    inputs:
      month:
        description: 'Mese (1-12, vuoto = corrente)'
        required: false
        type: string
      year:
        description: 'Anno (vuoto = corrente)'
        required: false
        type: string

jobs:
  setup:
    name: Calcola mese target
    runs-on: ubuntu-latest
    outputs:
      month: ${{ steps.calc.outputs.month }}
      year:  ${{ steps.calc.outputs.year }}
    steps:
      - id: calc
        run: |
          python3 - <<'EOF'
          import os
          from datetime import datetime
          now = datetime.now()
          m = int(os.environ.get('INPUT_MONTH') or now.month)
          y = int(os.environ.get('INPUT_YEAR')  or now.year)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'month={m}\nyear={y}\n')
          print(f'Mese target: {m:02d}/{y}')
          EOF
        env:
          INPUT_MONTH: ${{ inputs.month }}
          INPUT_YEAR:  ${{ inputs.year }}

  recurring-search:
    name: Ricerca Mercati Ricorrenti — tutta Italia
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Installa dipendenze
        run: pip install -r scraper/requirements.txt

      - name: Scansione mercati ricorrenti — ${{ needs.setup.outputs.month }}/${{ needs.setup.outputs.year }}
        run: |
          python -m scraper.main \
            --mode recurring \
            --month ${{ needs.setup.outputs.month }} \
            --year  ${{ needs.setup.outputs.year }}
        env:
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SITE_URL:          ${{ secrets.NEXT_PUBLIC_SITE_URL }}

  summary:
    name: Riepilogo
    needs: [setup, recurring-search]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          echo "Scansione mercati ricorrenti completata"
          echo "Mese: ${{ needs.setup.outputs.month }}/${{ needs.setup.outputs.year }}"
          echo "Status: ${{ needs.recurring-search.result }}"
