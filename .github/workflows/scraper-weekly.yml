name: Scraper Settimanale — 20 Regioni in Parallelo

on:
  schedule:
    # Ogni lunedì alle 06:00 UTC = 07:00/08:00 ora di Roma
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      month:
        description: 'Mese (1-12, vuoto = corrente)'
        required: false
        type: string
      year:
        description: 'Anno (vuoto = corrente)'
        required: false
        type: string
      region:
        description: 'Regione specifica (vuoto = tutte)'
        required: false
        type: string

jobs:
  # ── Calcola i mesi da scrapare ──────────────────────────────────────────
  setup:
    name: Calcola mesi
    runs-on: ubuntu-latest
    outputs:
      month1: ${{ steps.calc.outputs.month1 }}
      year1:  ${{ steps.calc.outputs.year1 }}
      month2: ${{ steps.calc.outputs.month2 }}
      year2:  ${{ steps.calc.outputs.year2 }}
    steps:
      - id: calc
        run: |
          python3 - <<'EOF'
          import os
          from datetime import datetime
          now = datetime.now()
          # Override da workflow_dispatch
          m1 = int(os.environ.get('INPUT_MONTH') or now.month)
          y1 = int(os.environ.get('INPUT_YEAR')  or now.year)
          m2 = m1 % 12 + 1
          y2 = y1 + (1 if m1 == 12 else 0)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'month1={m1}\nyear1={y1}\nmonth2={m2}\nyear2={y2}\n')
          print(f'Mese 1: {m1:02d}/{y1} | Mese 2: {m2:02d}/{y2}')
          EOF
        env:
          INPUT_MONTH: ${{ inputs.month }}
          INPUT_YEAR:  ${{ inputs.year }}

  # ── 20 scraper regionali in parallelo ──────────────────────────────────
  scrape-region:
    name: ${{ matrix.region }}
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false   # se una regione fallisce le altre continuano
      max-parallel: 20
      matrix:
        region:
          - Abruzzo
          - Basilicata
          - Calabria
          - Campania
          - Emilia-Romagna
          - Friuli-Venezia Giulia
          - Lazio
          - Liguria
          - Lombardia
          - Marche
          - Molise
          - Piemonte
          - Puglia
          - Sardegna
          - Sicilia
          - Toscana
          - Trentino-Alto Adige
          - Umbria
          - Valle d'Aosta
          - Veneto

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Installa dipendenze Python
        run: pip install -r scraper/requirements.txt

      - name: Installa Playwright (per StealthyFetcher)
        run: |
          pip install playwright
          playwright install chromium --with-deps
        continue-on-error: true

      - name: Scrape ${{ matrix.region }} — mese ${{ needs.setup.outputs.month1 }}/${{ needs.setup.outputs.year1 }}
        run: |
          python -m scraper.main \
            --region "${{ matrix.region }}" \
            --month ${{ needs.setup.outputs.month1 }} \
            --year  ${{ needs.setup.outputs.year1 }}
        env:
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SITE_URL:          ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      - name: Scrape ${{ matrix.region }} — mese ${{ needs.setup.outputs.month2 }}/${{ needs.setup.outputs.year2 }}
        run: |
          python -m scraper.main \
            --region "${{ matrix.region }}" \
            --month ${{ needs.setup.outputs.month2 }} \
            --year  ${{ needs.setup.outputs.year2 }}
        env:
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SITE_URL:          ${{ secrets.NEXT_PUBLIC_SITE_URL }}

  # ── Riepilogo finale ────────────────────────────────────────────────────
  summary:
    name: Riepilogo
    needs: [setup, scrape-region]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          echo "✅ Scraper completato"
          echo "Mesi: ${{ needs.setup.outputs.month1 }}/${{ needs.setup.outputs.year1 }} + ${{ needs.setup.outputs.month2 }}/${{ needs.setup.outputs.year2 }}"
          echo "20 regioni eseguite in parallelo"
