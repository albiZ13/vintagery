name: Scraper Settimanale — 20 Regioni in Parallelo

on:
  schedule:
    - cron: '0 6 * * 1'   # ogni lunedì 07:00 ora di Roma
  workflow_dispatch:
    inputs:
      month:
        description: 'Mese (1-12, vuoto = corrente)'
        required: false
        type: string
      year:
        description: 'Anno (vuoto = corrente)'
        required: false
        type: string

# ── Calcola mesi ────────────────────────────────────────────────────────────
jobs:
  setup:
    name: Calcola mesi
    runs-on: ubuntu-latest
    outputs:
      month1: ${{ steps.calc.outputs.month1 }}
      year1:  ${{ steps.calc.outputs.year1 }}
      month2: ${{ steps.calc.outputs.month2 }}
      year2:  ${{ steps.calc.outputs.year2 }}
    steps:
      - id: calc
        run: |
          python3 - <<'EOF'
          import os
          from datetime import datetime
          now = datetime.now()
          m1 = int(os.environ.get('INPUT_MONTH') or now.month)
          y1 = int(os.environ.get('INPUT_YEAR')  or now.year)
          m2 = m1 % 12 + 1
          y2 = y1 + (1 if m1 == 12 else 0)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'month1={m1}\nyear1={y1}\nmonth2={m2}\nyear2={y2}\n')
          print(f'Mese 1: {m1:02d}/{y1}  |  Mese 2: {m2:02d}/{y2}')
          EOF
        env:
          INPUT_MONTH: ${{ inputs.month }}
          INPUT_YEAR:  ${{ inputs.year }}

  # ── Fonti condivise — girano UNA VOLTA per tutte le regioni ───────────────
  # recurring_fairs, vinokilo, eventbrite, comuni, neventum, ecc.
  # Non beneficiano del parallelismo per regione: una sola run è sufficiente.
  shared-sources:
    name: Fonti condivise (tutte le regioni)
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt
      - run: pip install -r scraper/requirements.txt
      - name: Installa Playwright
        run: pip install playwright && playwright install chromium --with-deps
        continue-on-error: true

      - name: Fonti condivise — ${{ needs.setup.outputs.month1 }}/${{ needs.setup.outputs.year1 }}
        run: |
          python -m scraper.main \
            --month ${{ needs.setup.outputs.month1 }} \
            --year  ${{ needs.setup.outputs.year1 }} \
            --sources recurring_fairs vinokilo aggregators neventum eventbrite comuni cosedicasa brand_sales bakeca kijiji subito reddit telegram facebook
        env:
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SITE_URL:          ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          ANTHROPIC_API_KEY:             ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Fonti condivise — ${{ needs.setup.outputs.month2 }}/${{ needs.setup.outputs.year2 }}
        run: |
          python -m scraper.main \
            --month ${{ needs.setup.outputs.month2 }} \
            --year  ${{ needs.setup.outputs.year2 }} \
            --sources recurring_fairs vinokilo aggregators neventum eventbrite comuni cosedicasa brand_sales bakeca kijiji subito reddit telegram facebook
        env:
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SITE_URL:          ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          ANTHROPIC_API_KEY:             ${{ secrets.ANTHROPIC_API_KEY }}

  # ── 20 websearch regionali in parallelo ──────────────────────────────────
  # Solo websearch: l'unica fonte che fa ricerche mirate per regione.
  # 20 job simultanei, ognuno cerca profondamente solo la sua regione.
  websearch-region:
    name: Websearch ${{ matrix.region }}
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        region:
          - Abruzzo
          - Basilicata
          - Calabria
          - Campania
          - Emilia-Romagna
          - Friuli-Venezia Giulia
          - Lazio
          - Liguria
          - Lombardia
          - Marche
          - Molise
          - Piemonte
          - Puglia
          - Sardegna
          - Sicilia
          - Toscana
          - Trentino-Alto Adige
          - Umbria
          - Valle d'Aosta
          - Veneto
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scraper/requirements.txt
      - run: pip install -r scraper/requirements.txt
      - name: Installa Playwright
        run: pip install playwright && playwright install chromium --with-deps
        continue-on-error: true

      - name: Websearch ${{ matrix.region }} — ${{ needs.setup.outputs.month1 }}/${{ needs.setup.outputs.year1 }}
        run: |
          python -m scraper.main \
            --region "${{ matrix.region }}" \
            --month ${{ needs.setup.outputs.month1 }} \
            --year  ${{ needs.setup.outputs.year1 }} \
            --sources websearch
        env:
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SITE_URL:          ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          ANTHROPIC_API_KEY:             ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Websearch ${{ matrix.region }} — ${{ needs.setup.outputs.month2 }}/${{ needs.setup.outputs.year2 }}
        run: |
          python -m scraper.main \
            --region "${{ matrix.region }}" \
            --month ${{ needs.setup.outputs.month2 }} \
            --year  ${{ needs.setup.outputs.year2 }} \
            --sources websearch
        env:
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SITE_URL:          ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          ANTHROPIC_API_KEY:             ${{ secrets.ANTHROPIC_API_KEY }}

  # ── Riepilogo ────────────────────────────────────────────────────────────
  summary:
    name: Riepilogo
    needs: [setup, shared-sources, websearch-region]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          echo "Scraper completato"
          echo "Mesi: ${{ needs.setup.outputs.month1 }}/${{ needs.setup.outputs.year1 }} + ${{ needs.setup.outputs.month2 }}/${{ needs.setup.outputs.year2 }}"
