name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript + ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installa dipendenze
        run: npm install --legacy-peer-deps

      - name: TypeScript
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Verifica script Node validi
        run: |
          for f in scripts/*.mjs; do
            node --check "$f" || { echo "❌ Syntax error in $f"; exit 1; }
          done
          echo "✅ Tutti gli script MJS sono sintatticamente validi"

      - name: Verifica assenza segreti hardcoded
        run: |
          echo "Scansione per pattern di segreti hardcoded..."
          FOUND=0

          if grep -rn --include="*.ts" --include="*.tsx" --include="*.js" --include="*.mjs" \
            -E 'eyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{5,}' \
            --exclude-dir=node_modules --exclude-dir=.next .; then
            echo "❌ JWT hardcoded trovato"; FOUND=1
          fi

          if grep -rn --include="*.ts" --include="*.tsx" --include="*.js" --include="*.mjs" \
            -E '"sk_(live|test)_[A-Za-z0-9]{24,}"' \
            --exclude-dir=node_modules --exclude-dir=.next .; then
            echo "❌ Stripe secret key trovata"; FOUND=1
          fi

          if grep -rn --include="*.ts" --include="*.tsx" --include="*.js" --include="*.mjs" \
            -E '"re_[A-Za-z0-9_]{20,}"' \
            --exclude-dir=node_modules --exclude-dir=.next .; then
            echo "❌ Resend API key trovata"; FOUND=1
          fi

          if grep -rn --include="*.ts" --include="*.tsx" --include="*.js" --include="*.mjs" \
            -E '"sk-ant-[A-Za-z0-9_-]{20,}"' \
            --exclude-dir=node_modules --exclude-dir=.next .; then
            echo "❌ Anthropic API key trovata"; FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then exit 1; fi
          echo "✅ Nessun segreto hardcoded trovato"

  build-check:
    name: Next.js Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: typecheck

    env:
      NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SITE_URL:          ${{ secrets.NEXT_PUBLIC_SITE_URL }}
      RESEND_API_KEY:                ${{ secrets.RESEND_API_KEY }}
      SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY:             ${{ secrets.ANTHROPIC_API_KEY }}
      CRON_SECRET:                   ${{ secrets.CRON_SECRET }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installa dipendenze
        run: npm install --legacy-peer-deps

      - name: Build Next.js
        run: npx next build
