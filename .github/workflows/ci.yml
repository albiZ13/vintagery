name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript + ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installa dipendenze
        run: npm ci --ignore-scripts

      - name: TypeScript
        run: npx tsc --noEmit

      - name: ESLint
        run: npx next lint --max-warnings 5

      - name: Verifica assenza segreti hardcoded
        run: |
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | xargs grep -l \
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\|sk_live_\|re_[A-Za-z0-9]\{20\}' \
            2>/dev/null; then
            echo "⚠️  Possibile segreto hardcoded trovato"
            exit 1
          fi
          echo "✓ Nessun segreto hardcoded rilevato"
