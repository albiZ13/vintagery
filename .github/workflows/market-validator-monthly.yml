name: Validazione Mensile Mercati

on:
  schedule:
    - cron: '0 5 1 * *'   # 1° di ogni mese alle 07:00 ora di Roma (05:00 UTC)
  workflow_dispatch:

jobs:
  validate:
    name: Pulisci, valida e arricchisci tutti i mercati
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installa dipendenze
        run: npm ci --ignore-scripts

      - name: Refresh date prossime occorrenze
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -X POST "$SITE_URL/api/refresh-recurring-dates" \
            -H "Authorization: Bearer $CRON_SECRET") || STATUS=0
          echo "refresh-recurring-dates → HTTP $STATUS"
        env:
          SITE_URL:    ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Valida, pulisce e arricchisce tutti i mercati
        run: node scripts/validate-markets.mjs 2>&1 | tee /tmp/validate-output.txt
        env:
          SUPABASE_URL:         ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Genera report qualità post-validazione
        run: node scripts/data-quality-report.mjs > /tmp/quality-report.md
        env:
          SUPABASE_URL:         ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Crea Issue con risultati validazione
        run: |
          gh issue create \
            --title "🔍 Validazione Mensile — $(date +'%B %Y')" \
            --body-file /tmp/quality-report.md \
            --label "monthly-validation,automated"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
